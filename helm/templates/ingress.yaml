apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: springboot-demo-ingress
  namespace: jenkins

spec:

  ingressClassName: {{ .Values.ingress.className }}

  rules:

    - host: {{ .Values.ingress.host }}

      http:

        paths:

          - path: /

            pathType: Prefix

            backend:

              service:

                name: springboot-demo-service

                port:

                  number: {{ .Values.service.port }}
